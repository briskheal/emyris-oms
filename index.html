<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMYRIS OMS | Stockist Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #10b981;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text-main); min-height: 100vh; }

        .navbar { height: 80px; background: #fff; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 4%; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .logo { font-weight: 800; font-size: 1.6rem; color: var(--primary); }
        
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }

        /* --- AUTH VIEWS --- */
        .auth-card { max-width: 450px; margin: 4rem auto; background: #fff; padding: 2.5rem; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border: 1px solid var(--border); }
        .auth-title { font-size: 1.75rem; font-weight: 800; margin-bottom: 0.5rem; text-align: center; }
        .auth-subtitle { color: var(--text-muted); text-align: center; margin-bottom: 2rem; font-size: 0.9rem; }

        /* --- ORDERING VIEW --- */
        .company-header { background: linear-gradient(135deg, var(--primary) 0%, #4f46e5 100%); color: #fff; padding: 3rem 2rem; border-radius: 32px; margin-bottom: 2rem; position: relative; overflow: hidden; }
        .company-header::after { content: ''; position: absolute; top: -50%; right: -10%; width: 300px; height: 300px; background: rgba(255,255,255,0.1); border-radius: 50%; }

        .category-scroll { display: flex; gap: 1rem; overflow-x: auto; padding-bottom: 1rem; margin-bottom: 2rem; scrollbar-width: none; }
        .cat-chip { padding: 0.75rem 1.5rem; background: #fff; border: 1px solid var(--border); border-radius: 50px; cursor: pointer; white-space: nowrap; font-weight: 600; transition: 0.3s; }
        .cat-chip:hover { border-color: var(--primary); color: var(--primary); }
        .cat-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        .order-grid { display: grid; grid-template-columns: 1fr 350px; gap: 2rem; }
        .product-card { background: #fff; border: 1px solid var(--border); border-radius: 20px; padding: 1.25rem; margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; transition: 0.3s; }
        .product-card:hover { transform: translateX(5px); border-color: var(--primary); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }

        .qty-input { width: 80px; padding: 0.5rem; border: 1px solid var(--border); border-radius: 8px; text-align: center; font-weight: 700; }

        .summary-card { background: #fff; border: 1px solid var(--border); border-radius: 24px; padding: 2rem; position: sticky; top: 100px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 1rem; font-size: 0.95rem; }
        .total-row { border-top: 2px dashed var(--border); margin-top: 1rem; padding-top: 1rem; font-size: 1.4rem; font-weight: 800; color: var(--primary); }

        /* --- BUTTONS --- */
        .btn { padding: 0.8rem 1.5rem; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; border: none; width: 100%; font-size: 1rem; }
        .btn-primary { background: var(--primary); color: #fff; box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3); }
        .btn-primary:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn-link { background: none; color: var(--primary); font-size: 0.9rem; }

        .form-group { margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.85rem; font-weight: 700; color: var(--text-main); margin-bottom: 0.5rem; }
        input { width: 100%; border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem 1rem; font-size: 1rem; }
        input:focus { outline: none; border-color: var(--primary); }

        .hidden { display: none; }
        .bonus-tag { background: #dcfce7; color: #166534; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 800; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">EMYRIS OMS</div>
        <div id="userMenu" class="hidden">
            <span id="stockistName" style="font-weight: 700; margin-right: 1.5rem;"></span>
            <button class="btn-link" onclick="logout()">Logout</button>
        </div>
    </nav>

    <!-- LOGIN VIEW -->
    <div id="view-login" class="container">
        <div class="auth-card">
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Login to manage your orders</p>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Login ID</label>
                    <input type="text" id="login-id" required placeholder="Enter your ID">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-pass" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary">SIGN IN</button>
                <div style="text-align: center; margin-top: 1.5rem;">
                    <button type="button" class="btn-link" onclick="switchView('register')">New Stockist? Register Here</button>
                </div>
            </form>
        </div>
    </div>

    <!-- REGISTRATION VIEW -->
    <div id="view-register" class="container hidden">
        <div class="auth-card" style="max-width: 600px;">
            <h1 class="auth-title">Stockist Registration</h1>
            <p class="auth-subtitle">Join the Emyris Distribution Network</p>
            <form onsubmit="handleRegister(event)">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Firm/Stockist Name</label>
                        <input type="text" id="reg-name" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="reg-email" required>
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Contact Phone</label>
                        <input type="tel" id="reg-phone" required>
                    </div>
                    <div class="form-group">
                        <label>Create Login ID</label>
                        <input type="text" id="reg-login" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-pass" required>
                </div>
                <div class="form-group">
                    <label>Full Billing Address</label>
                    <input type="text" id="reg-address" required>
                </div>
                <button type="submit" class="btn btn-primary">CREATE ACCOUNT</button>
                <div style="text-align: center; margin-top: 1.5rem;">
                    <button type="button" class="btn-link" onclick="switchView('login')">Already have an account? Login</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ORDERING VIEW -->
    <div id="view-order" class="container hidden">
        <div class="company-header">
            <h1 style="font-size: 2.2rem; margin-bottom: 0.5rem;">Welcome to EMYRIS OMS</h1>
            <p id="co-address" style="opacity: 0.9; font-size: 0.9rem; max-width: 600px;">Loading address...</p>
            <div style="display: flex; gap: 2rem; margin-top: 1.5rem; font-weight: 600; font-size: 0.9rem;">
                <span id="co-web">🌐 www.emyrisbio.com</span>
                <span id="co-phone">📞 +91-XXXXXXXXXX</span>
            </div>
        </div>

        <div class="category-scroll" id="categoryChips">
            <div class="cat-chip active" onclick="filterCat('ALL', this)">ALL PRODUCTS</div>
        </div>

        <div class="order-grid">
            <div id="productList">
                <!-- Products will render here -->
            </div>

            <div class="summary-card">
                <h3 style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px;">🛒 Order Summary</h3>
                <div id="orderItems">
                    <!-- Cart items -->
                </div>
                <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border);">
                    <div class="summary-row">
                        <span>Items Total</span>
                        <span id="sum-subtotal">₹0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>GST (<span id="sum-gst-rate">12</span>%)</span>
                        <span id="sum-gst-amt">₹0.00</span>
                    </div>
                    <div class="total-row">
                        <span>Total</span>
                        <span id="sum-grand">₹0.00</span>
                    </div>
                    <button class="btn btn-primary" style="margin-top: 2rem;" onclick="placeOrder()">PLACE ORDER NOW</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
